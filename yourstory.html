<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Story — BCS Memory Box</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{font-family:Georgia,'Times New Roman',serif;color:#2a2520;background:#faf7f2;line-height:1.6;}
  body{min-height:100vh;display:flex;flex-direction:column;}
  header{padding:20px 32px;border-bottom:1px solid #e8dfc9;background:#fff;display:flex;justify-content:space-between;align-items:center;}
  header .brand{color:#8b5a2b;text-decoration:none;font-size:20px;font-weight:bold;}
  header .brand:hover{text-decoration:underline;}
  header .welcome{color:#5a4a3a;font-size:15px;}
  main{flex:1;max-width:880px;margin:32px auto;padding:0 24px;width:100%;}

  .status-bar{display:flex;gap:8px;background:#fff;border-radius:8px;padding:18px 24px;margin-bottom:32px;box-shadow:0 2px 12px rgba(0,0,0,0.04);flex-wrap:wrap;}
  .step{flex:1;min-width:130px;text-align:center;padding:8px 6px;border-radius:4px;font-size:13px;color:#999;}
  .step.done{color:#2a5a2a;background:#eaf5ea;}
  .step.current{color:#8b5a2b;background:#faf7f0;font-weight:bold;}
  .step .icon{display:inline-block;margin-right:4px;}

  .card{background:#fff;border-radius:8px;padding:36px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
  .eyebrow{font-size:13px;color:#8b5a2b;letter-spacing:.15em;text-transform:uppercase;font-weight:bold;margin-bottom:10px;}
  h1{font-size:30px;line-height:1.2;margin-bottom:16px;color:#2a2520;}
  h2{font-size:23px;line-height:1.25;margin-bottom:14px;color:#2a2520;margin-top:8px;}
  p{margin-bottom:14px;color:#3a3530;font-size:17px;}
  .muted{color:#888;font-size:15px;}
  .reassure{background:#fbf7ef;border-left:4px solid #8B1A2B;border-radius:8px;padding:16px 18px;margin:0 0 20px;color:#5a4a3a;font-size:15px;line-height:1.55;}
  .reassure strong{color:#8B1A2B;}

  .sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:20px;}
  .section-card{background:#faf7f0;border-left:4px solid #8b5a2b;padding:16px 18px;border-radius:4px;}
  .section-card h3{font-size:16px;color:#8b5a2b;margin-bottom:6px;}
  .section-card p{font-size:14px;color:#5a4a3a;margin-bottom:0;}

  .recordings{margin-top:24px;}
  .recording-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #f0e8d4;}
  .recording-row:last-child{border-bottom:none;}
  .recording-info{flex:1;}
  .recording-name{font-weight:bold;color:#2a2520;font-size:15px;}
  .recording-meta{font-size:13px;color:#888;margin-top:2px;}
  .recording-status{font-size:13px;padding:3px 10px;border-radius:999px;font-weight:bold;}
  .recording-status.pending{background:#f5f0e0;color:#8b5a2b;}
  .recording-status.completed{background:#eaf5ea;color:#2a5a2a;}
  .recording-status.error{background:#fcecea;color:#c0392b;}
  .empty-recordings{padding:24px;text-align:center;color:#888;background:#faf7f0;border-radius:4px;font-style:italic;}

  .upload-zone{margin-top:24px;border:2px dashed #d4cab5;padding:36px 24px;text-align:center;border-radius:6px;background:#faf7f0;}
  .upload-zone p{margin-bottom:14px;color:#5a4a3a;}
  .btn{display:inline-block;padding:14px 28px;font-family:Georgia,serif;font-size:17px;font-weight:bold;background:#8b5a2b;color:#fff;border:none;border-radius:4px;cursor:pointer;text-decoration:none;}
  .btn:hover{background:#6f4720;}
  .btn:disabled{background:#bbb;cursor:not-allowed;}
  .btn-secondary{background:#e8dfc9;color:#2a2520;}
  .btn-secondary:hover{background:#d6c9a8;}
  .btn-large{padding:18px 36px;font-size:18px;display:block;margin:24px auto 0;}

  .photo-grid{display:flex;flex-wrap:wrap;gap:16px;margin-top:24px;justify-content:center;}
  .photo-tile{width:160px;}
  .photo-tile img{width:160px;height:160px;object-fit:cover;border-radius:6px;border:1px solid #e8dfc9;background:#faf7f0;display:block;}
  .photo-fallback{width:160px;height:160px;border-radius:6px;border:1px solid #e8dfc9;background:#faf7f0;display:none;align-items:center;justify-content:center;text-align:center;color:#2a5a2a;font-size:14px;padding:10px;}
  .photo-caption{margin-top:6px;font-size:14px;color:#5a4a3a;text-align:center;}
  .photo-remove{background:none;border:none;color:#c0392b;font-family:Georgia,serif;font-size:13px;cursor:pointer;padding:2px 0;text-decoration:underline;display:block;margin:2px auto 0;}

  .alert{padding:16px 20px;border-radius:6px;margin-bottom:16px;font-size:15px;}
  .alert-warning{background:#fef6e7;border-left:4px solid #d97706;color:#7c4a03;}
  .alert-error{background:#fcecea;border-left:4px solid #c0392b;color:#c0392b;}
  .alert-success{background:#eaf5ea;border-left:4px solid #2a5a2a;color:#2a5a2a;}
  .alert-info{background:#eef4fb;border-left:4px solid #2c5e8d;color:#2c5e8d;}

  .loading{text-align:center;padding:48px;color:#888;}
  .spinner{width:42px;height:42px;margin:0 auto 16px;border:4px solid #e8dfc9;border-top-color:#8b5a2b;border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{text-align:center;padding:24px;color:#999;font-size:13px;}
  footer a{color:#999;}
</style>
</head>
<body>

<header>
  <a class="brand" href="/">BCS Memory Box</a>
  <a class="brand" href="/how-it-works.html" style="font-size:15px;font-weight:normal;">How it works</a>
  <div class="welcome" id="header-welcome"></div>
</header>

<main id="main">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading your story…</p>
  </div>
</main>

<footer>
  <p>BCS Memory Box · Ken Baker · <a href="mailto:kbakerbcs1@gmail.com">kbakerbcs1@gmail.com</a></p>
</footer>

<script>
var API_BASE = 'https://bcs-memory-box-site.onrender.com';
var RECORDING_TITLES = {};
var PHOTO_CAPTIONS = {};
var SAVED_SAFE_HTML = '<strong>\u2713 Saved \u2014 and safe.</strong> Tell your stories in any order \u2014 I\u2019ll tie it all together into one flowing memoir at the end. Whenever you\u2019re ready for more, just go back to the homepage and tap <strong>Continue your story</strong> \u2014 you\u2019ll be right back where you left off.';

// Read token from query string (?token=xyz)
function getToken() {
  var params = new URLSearchParams(window.location.search);
  return params.get('token');
}

function escapeHtml(s) {
  var div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

// Inline editor for naming/captioning a photo (calls PUT .../photo/:id/caption).
function bindPhotoCaptions() {
  var token = getToken();
  document.querySelectorAll('.pc-edit').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = btn.getAttribute('data-id');
      var wrap = document.getElementById('pc-' + id);
      if (!wrap) return;
      wrap.innerHTML =
        '<input type="text" class="pc-input" maxlength="500" placeholder="Name and date (e.g. Mom and Dad, Christmas 1975)" style="font-size:15px;padding:7px 9px;border:1px solid #c9b79c;border-radius:6px;width:150px;display:block;margin:0 auto 6px;">' +
        '<button type="button" class="pc-save" style="font-size:13px;">Save</button>' +
        ' <button type="button" class="pc-cancel" style="font-size:13px;margin-left:4px;">Cancel</button>';
      var input = wrap.querySelector('.pc-input');
      input.value = PHOTO_CAPTIONS[id] || '';
      input.focus();
      wrap.querySelector('.pc-cancel').addEventListener('click', function() { window.location.reload(); });
      function doSave() {
        var saveBtn = wrap.querySelector('.pc-save');
        saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
        fetch(API_BASE + '/api/customer/photo/' + encodeURIComponent(id) + '/caption?token=' + encodeURIComponent(token), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ caption: input.value.trim() })
        }).then(function(r) { return r.json(); }).then(function() { window.location.reload(); })
          .catch(function() { saveBtn.disabled = false; saveBtn.textContent = 'Save'; alert('Could not save - please try again.'); });
      }
      wrap.querySelector('.pc-save').addEventListener('click', doSave);
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSave(); });
    });
  });
}

// Inline editor for naming/renaming a recording (calls PUT .../recording/:id/title).
function bindRecordingTitles() {
  var token = getToken();
  document.querySelectorAll('.rt-edit').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = btn.getAttribute('data-id');
      var wrap = document.getElementById('rt-' + id);
      if (!wrap) return;
      wrap.innerHTML =
        '<input type="text" class="rt-input" maxlength="80" placeholder="Name this memory (for example: war story)" style="font-size:16px;padding:7px 9px;border:1px solid #c9b79c;border-radius:6px;width:62%;max-width:300px;">' +
        ' <button type="button" class="rt-save" style="font-size:14px;">Save</button>' +
        ' <button type="button" class="rt-cancel" style="font-size:14px;margin-left:4px;">Cancel</button>';
      var input = wrap.querySelector('.rt-input');
      input.value = RECORDING_TITLES[id] || '';
      input.focus();
      wrap.querySelector('.rt-cancel').addEventListener('click', function() { window.location.reload(); });
      function doSave() {
        var saveBtn = wrap.querySelector('.rt-save');
        saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
        fetch(API_BASE + '/api/customer/recording/' + encodeURIComponent(id) + '/title?token=' + encodeURIComponent(token), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: input.value.trim() })
        }).then(function(r) { return r.json(); }).then(function() { window.location.reload(); })
          .catch(function() { saveBtn.disabled = false; saveBtn.textContent = 'Save'; alert('Could not save the name - please try again.'); });
      }
      wrap.querySelector('.rt-save').addEventListener('click', doSave);
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSave(); });
    });
  });
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

// Render the appropriate UI for a given customer status
function renderStatusBar(status) {
  var steps = [
    { key: 'awaiting_payment', label: 'Account created', icon: '✓' },
    { key: 'recording',         label: 'Payment complete', icon: '✓' },
    { key: 'processing',        label: 'Recording',        icon: '🎙' },
    { key: 'draft_ready',       label: 'Draft ready',      icon: '📄' },
    { key: 'delivered',         label: 'Delivered',        icon: '🎁' },
  ];
  var order = ['awaiting_payment', 'recording', 'processing', 'draft_ready', 'delivered'];
  var currentIdx = order.indexOf(status);
  var html = '<div class="status-bar">';
  steps.forEach(function(s, i){
    var cls = 'step';
    if (i < currentIdx) cls += ' done';
    if (i === currentIdx) cls += ' current';
    html += '<div class="' + cls + '"><span class="icon">' + s.icon + '</span>' + s.label + '</div>';
  });
  html += '</div>';
  return html;
}

function renderAwaitingPayment(customer) {
  return renderStatusBar(customer.status) +
    '<div class="card">' +
      '<div class="eyebrow">One step left</div>' +
      '<h1>Your account is ready, ' + escapeHtml(customer.name) + '.</h1>' +
      '<div class="alert alert-warning">' +
        'Your account exists but payment for Your Story ($125) hasn\'t been completed yet. ' +
        'Once Stripe checkout is wired up, you\'ll be able to complete payment right from here.' +
      '</div>' +
      '<p class="muted">Account: ' + escapeHtml(customer.email) + ' · Created ' + formatDate(customer.createdAt) + '</p>' +
    '</div>';
}

function renderRecordingPage(data) {
  var c = data.customer;
  var recordings = data.recordings || [];
  var photos = data.photos || [];
  var html = renderStatusBar(c.status);
  html += '<div class="card">';
  var firstName = escapeHtml((c.name || '').split(' ')[0] || 'there');
  if (recordings.length === 0) {
    html += '<div class="eyebrow">A note from Ken</div>';
    html += '<h1>Welcome, ' + firstName + ' — and thank you.</h1>';
    html += '<p>It’s an honor to help you put your life into words, in your own voice, for the people who love you.</p>';
    html += '<p style="margin-bottom:6px;"><strong>Here’s all there is to it:</strong></p>';
    html += '<ul style="margin:0 0 14px 22px;color:#3a3530;font-size:16px;line-height:1.6;">' +
      '<li style="margin-bottom:9px;"><strong>Press the big “Start recording” button and just talk</strong> — like you’re telling a story at the kitchen table. Press it again when you’re finished, and it saves all by itself.</li>' +
      '<li style="margin-bottom:9px;"><strong>You can listen back anytime.</strong> Everything you record stays right here — press play on any of them whenever you like.</li>' +
      '<li style="margin-bottom:9px;"><strong>Add a photo</strong> whenever one goes with a story.</li>' +
      '<li style="margin-bottom:9px;"><strong>There’s no rush.</strong> Record a little, take a break, and come back whenever you want — your story will be right here waiting for you.</li>' +
      '<li><strong>When you’ve said everything you want,</strong> press “I’m done,” and I’ll turn it all into a beautiful memoir for you.</li>' +
    '</ul>';
    html += '<p style="margin-bottom:0;">Take your time, and enjoy the remembering.<br><strong>— Ken</strong></p>';
  } else {
    html += '<div class="eyebrow">Welcome back</div>';
    html += '<h1>Welcome back, ' + firstName + '.</h1>';
    html += '<p>Pick up right where you left off — have a listen to what you’ve recorded below, then add more whenever you’re ready. Your story is safe and waiting for you.</p>';
  }

  // Four sections guide
  html += '<h2 style="margin-top:32px;">The four sections to record</h2>';
  html += '<div class="sections">' +
    '<div class="section-card"><h3>1. Family and Origins</h3><p>Your parents and grandparents. Names, dates, where they came from, what they did.</p></div>' +
    '<div class="section-card"><h3>2. Early Childhood</h3><p>Where you grew up, friends, school, the world you knew as a child.</p></div>' +
    '<div class="section-card"><h3>3. Family Life</h3><p>Your children, marriage, vacations, traditions, the family you built.</p></div>' +
    '<div class="section-card"><h3>4. Reflections</h3><p>Likes and dislikes, what people meant to you, how you see the world.</p></div>' +
  '</div>';
  html += '</div>';

  // Recordings list
  html += '<div class="card">';
  html += '<h2>Your recordings (' + recordings.length + ')</h2>';
  if (recordings.length === 0) {
    html += '<div class="empty-recordings">No recordings yet. Upload your first one below.</div>';
  } else {
    html += '<div class="recordings">';
    recordings.forEach(function(r, idx) {
      var statusClass = r.transcript_status === 'completed' ? 'completed' :
                        r.transcript_status === 'error' ? 'error' : 'pending';
      var statusLabel = r.transcript_status === 'completed' ? 'Ready' :
                        r.transcript_status === 'error' ? 'Error' :
                        r.transcript_status === 'transcribing' ? 'Processing' : 'Waiting';
      RECORDING_TITLES[r.id] = (r.title || '');
      var displayTitle = (r.title && r.title.trim()) ? r.title : ('Recording ' + (idx + 1));
      html += '<div class="recording-row">' +
        '<div class="recording-info">' +
          '<div class="recording-name" id="rt-' + r.id + '">' +
            '<span class="rt-text">' + escapeHtml(displayTitle) + '</span>' +
            '<button type="button" class="rt-edit" data-id="' + r.id + '" aria-label="Rename this recording" style="background:none;border:none;color:#8b5a2b;cursor:pointer;font-size:13px;text-decoration:underline;padding:0 0 0 10px;">Rename</button>' +
          '</div>' +
          '<div class="recording-meta">' + formatDate(r.created_at) + ' · ' + formatSize(r.size_bytes) + '</div>' +
        '</div>' +
        '<div class="recording-status ' + statusClass + '">' + statusLabel + '</div>' +
      '</div>';
        html += '<audio controls preload="none" style="display:block;width:100%;margin-top:6px;" src="' + API_BASE + '/api/customer/recording-audio?token=' + encodeURIComponent(getToken()) + '&id=' + encodeURIComponent(r.id) + '"></audio>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Upload zone — real, wired to /api/customer/upload
  html += '<div class="card">';
  html += '<h2>Add a recording</h2>';
  html += '<div class="reassure"><strong>Relax and just talk.</strong> Every recording saves automatically \u2014 close this page anytime, then come back to the homepage and tap <strong>Continue your story</strong> to add more. Record your memories in any order, big or small. When you\u2019re done, I weave everything together into one smooth, flowing memoir across your four chapters. Nothing is lost, and nothing has to be perfect.</div>';
  html += '<div class="upload-zone">' +
    '<p style="font-size:18px;color:#5a4a3a;">Press the button, tell your story, and press it again when you\'re done. We\'ll take care of the rest.</p>' +
    '<button class="btn btn-large" id="record-btn" style="margin:12px auto 0;">● Start recording</button>' +
    '<p id="record-timer" style="font-size:22px;color:#8b5a2b;margin-top:14px;font-weight:bold;display:none;">0:00</p>' +
    '<audio id="record-preview" controls style="display:none;margin:14px auto 0;width:100%;max-width:380px;"></audio>' +
    '<div id="record-actions" style="display:none;margin-top:14px;">' +
      '<button class="btn" id="record-save">Save this recording</button>' +
      '<button class="btn btn-secondary" id="record-redo" style="margin-left:8px;">Re-record</button>' +
    '</div>' +
    '<p id="record-status" style="margin-top:12px;color:#5a4a3a;font-size:14px;"></p>' +
    '<hr style="border:none;border-top:1px solid #e8dfc9;margin:26px 0 18px;">' +
    '<p class="muted" style="font-size:14px;">Already have an audio file? You can upload it instead. Accepted: .m4a, .mp3, .wav, .aac, .webm, up to 100 MB.</p>' +
    '<input type="file" id="audio-file" accept="audio/*,.m4a,.mp3,.wav,.aac,.webm" style="display:none;" />' +
    '<button class="btn btn-secondary" id="upload-btn" style="margin-top:10px;">Choose audio file</button>' +
    '<p id="upload-status" style="margin-top:12px;color:#5a4a3a;font-size:14px;"></p>' +
  '</div>';
  html += '</div>';

  // Photographs — optional, gathered alongside recordings. Ken places them in
  // the memoir when he polishes the draft, so the customer just adds them here.
  html += '<div class="card">';
  html += '<h2>Add photographs <span style="font-weight:normal;color:#888;font-size:17px;">(optional)</span></h2>';
  html += '<p>Have a favorite picture for your story? Add it here. On your phone, the button opens your camera — just hold up an old photograph and take a picture of it — or choose one you already have. There\'s nothing to figure out; Ken places the photos into your memoir for you.</p>';
  if (photos.length > 0) {
    html += '<div class="photo-grid">';
    photos.forEach(function(p) {
      var src = API_BASE + '/api/customer/photo/' + p.id + '?token=' + encodeURIComponent(getToken());
      PHOTO_CAPTIONS[p.id] = (p.caption || '');
      html += '<div class="photo-tile">' +
        '<img src="' + src + '" alt="' + escapeHtml(p.caption || 'photo') + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" />' +
        '<div class="photo-fallback">Photo added ✓</div>' +
        '<div class="photo-caption" id="pc-' + p.id + '">' + (p.caption ? '<span class="pc-text">' + escapeHtml(p.caption) + '</span>' : '<span class="pc-text" style="color:#9a8b78;font-style:italic;">No name yet</span>') + ' <button type="button" class="pc-edit" data-id="' + p.id + '" style="background:none;border:none;color:#8b5a2b;cursor:pointer;font-size:13px;text-decoration:underline;padding:0;">' + (p.caption ? 'Edit name' : 'Add name + date') + '</button></div>' +
        '<button class="photo-remove" data-photo-id="' + p.id + '">Remove</button>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '<div class="upload-zone">' +
    '<p style="font-size:17px;color:#5a4a3a;">Add a photograph to go with your story.</p>' +
    '<input type="text" id="photo-caption" placeholder="Name and date, e.g. Mom and Dad, Christmas 1975 (optional)" style="width:100%;max-width:460px;padding:12px 14px;font-family:Georgia,serif;font-size:16px;border:1px solid #d4cab5;border-radius:4px;margin-bottom:6px;" />' +
    '<input type="file" id="photo-file" accept="image/*" style="display:none;" />' +
    '<button class="btn btn-large" id="photo-btn" style="margin:14px auto 0;">📷 Add a photo</button>' +
    '<p id="photo-status" style="margin-top:12px;color:#5a4a3a;font-size:14px;"></p>' +
  '</div>';
  html += '</div>';

  // Done button — fires the cleanup pipeline asynchronously.
  if (recordings.length > 0) {
    html += '<button class="btn btn-large" id="done-btn">I\'m done — turn my recordings into a memoir</button>';
    html += '<p id="done-status" style="text-align:center;color:#999;font-size:13px;margin-top:8px;">' +
            'Click when you\'ve recorded everything you want. Processing usually takes 15-30 minutes.' +
            '</p>';
  }

  return html;
}

function renderProcessing(customer) {
  // Trigger polling once the view has rendered (deferred to next tick)
  setTimeout(startProcessingPoll, 100);
  return renderStatusBar(customer.status) +
    '<div class="card">' +
      '<div class="eyebrow">In progress</div>' +
      '<h1>Your memoir is being prepared.</h1>' +
      '<p>Thank you, ' + escapeHtml(customer.name) + '. Your recordings are being transcribed and polished into your memoir document. You\'ll get an email when it\'s ready for your review.</p>' +
      '<div class="loading"><div class="spinner"></div><p>Usually takes 15-30 minutes. This page will update automatically.</p></div>' +
    '</div>';
}

function renderDraftReady(customer, photoCount) {
  var token = getToken();
  var dl = API_BASE + '/api/customer/download?token=' + encodeURIComponent(token);
  var photoNote = (photoCount > 0)
    ? '<p style="background:#f4efe2;border:1px solid #e8dfc9;border-radius:6px;padding:14px 16px;margin-top:16px;line-height:1.5;">\uD83D\uDCF7 <strong>Your ' + photoCount + ' photograph' + (photoCount === 1 ? ' is' : 's are') + ' included in your memoir</strong>, placed right alongside the stories they belong to, with the names you gave them. If you would also like a printed hardcover copy, you can order one anytime \u2014 just reach out to Ken.</p>'
    : '';
  return renderStatusBar(customer.status) +

// Boot
(async function() {
  var token = getToken();
  if (!token) {
    document.getElementById('main').innerHTML = renderError('No access token in the URL. Make sure you\'re using the link from your welcome email.');
    return;
  }

  // Progressive reassurance while Render's server wakes from sleep (cold start).
  function setLoadingMsg(m){ var el=document.querySelector('#main .loading p'); if(el){ el.textContent=m; } }
  var _t1=setTimeout(function(){ setLoadingMsg('Waking things up \u2014 the first visit of the day can take up to a minute. Hang tight\u2026'); },4000);
  var _t2=setTimeout(function(){ setLoadingMsg('Almost there \u2014 still waking the server, thanks for your patience\u2026'); },25000);
  // Fetch /me with a per-try timeout + a few automatic retries (a cold start often
  // needs one request to wake the server and the next one succeeds).
  async function fetchMe(){
    for (var i=0;i<3;i++){
      var ctrl=new AbortController();
      var to=setTimeout(function(){ ctrl.abort(); },30000);
      try { var r=await fetch(API_BASE + '/api/customer/me?token=' + encodeURIComponent(token), {signal:ctrl.signal}); clearTimeout(to); return r; }
      catch(e){ clearTimeout(to); if(i<2){ await new Promise(function(res){ setTimeout(res,2000); }); } }
    }
    return null;
  }
  try {
    var resp = await fetchMe();
    clearTimeout(_t1); clearTimeout(_t2);
    if (!resp) {
      document.getElementById('main').innerHTML =
        renderError('It\u2019s taking longer than usual to reach the server \u2014 it\u2019s most likely just waking up. Wait a few seconds, then tap Retry.') +
        '<div style="text-align:center;margin-top:-8px;"><button class="btn btn-large" onclick="window.location.reload()">Retry</button></div>';
      return;
    }
    if (!resp.ok) {
      var err = await resp.json().catch(function(){return {error:'Server error'};});
      document.getElementById('main').innerHTML = renderError(err.error || ('Could not load (status ' + resp.status + ')'));
      return;
    }
    var data = await resp.json();
    if (!data.ok || !data.customer) {
      document.getElementById('main').innerHTML = renderError('Account data missing.');
      return;
    }

    // Set header
    document.getElementById('header-welcome').textContent = 'Signed in as ' + data.customer.email;

    // Remember this device so the customer can return with ONE CLICK from the
    // homepage next time — no need to retype their email. Stored locally on
    // their own device only; cleared if they clear their browser.
    try {
      localStorage.setItem('bcs_story_token', token);
      localStorage.setItem('bcs_story_name', (data.customer.name || '').split(' ')[0] || '');
    } catch (e) { /* private mode / storage off — non-fatal, email fallback still works */ }

    // First-run onboarding: send a brand-new paying customer into the guided
    // warm-up ONCE, so nobody stalls on a blank page. Fully guarded against loops:
    //  - only when status is 'recording' AND they have zero recordings,
    //  - skipped if the URL already carries ?warmup= (set when returning from it),
    //  - skipped if this device already did it (localStorage flag).
    // Anyone who has recorded anything (incl. finishing the warm-up) falls through.
    try {
      var _warmupParam = new URLSearchParams(window.location.search).get('warmup');
      var _isBrandNew = data.customer.status === 'recording' && (data.recordings || []).length === 0;
      var _warmupDone = false; try { _warmupDone = !!localStorage.getItem('bcs_warmup_done'); } catch (e2) {}
      if (_isBrandNew && !_warmupParam && !_warmupDone) {
        window.location.replace('first-session.html?token=' + encodeURIComponent(token));
        return;
      }
    } catch (e3) { /* if anything is off, just show the normal story page */ }

    // Pick the renderer based on status
    var status = data.customer.status;
    var html;
    if (status === 'awaiting_payment') html = renderAwaitingPayment(data.customer);
    else if (status === 'recording')   html = renderRecordingPage(data);
    else if (status === 'processing')  html = renderProcessing(data.customer);
    else if (status === 'draft_ready') html = renderDraftReady(data.customer, (data.photos||[]).length);
    else if (status === 'delivered')   html = renderDelivered(data.customer, (data.photos||[]).length);
    else if (status === 'error')              html = renderErrorState(data.customer);
    else if (status === 'revision_requested') html = renderRevisionRequested(data.customer);
    else html = renderError('Unknown status: ' + status);

    document.getElementById('main').innerHTML = html;

    // After render, wire the upload UI, the in-browser recorder, the photo
    // uploader, the I'm done button, and the revision form.
    bindUploadHandler();
    bindRecordHandler();
    bindPhotoHandler();
    bindDoneHandler(data.customer.status);
    bindRevisionHandler();
    bindOrderBook();
      bindPhotoDrop();
    bindRecordingTitles();
    bindPhotoCaptions();
  } catch (e) {
    console.error('yourstory load error:', e);
    document.getElementById('main').innerHTML = renderError(e.message || 'Network error.');
  }
})();

// Wire the I'm done button (and the retry button when in error state).
function bindDoneHandler(currentStatus) {
  var doneBtn = document.getElementById('done-btn') || document.getElementById('retry-btn');
  var statusEl = document.getElementById('done-status') || document.getElementById('retry-status');
  if (!doneBtn) return;

  doneBtn.addEventListener('click', async function() {
    if (window.__bcsRecording) {
      alert('You’re still recording — please press the Stop button first so your recording saves, then tap “I’m done.”');
      return;
    }
    var token = getToken();
    if (!token) return;
    doneBtn.disabled = true;
    doneBtn.textContent = 'Starting…';
    if (statusEl) statusEl.textContent = 'Kicking off the cleanup pipeline…';

    try {
      var resp = await fetch(API_BASE + '/api/customer/finish-recording?token=' + encodeURIComponent(token), {
        method: 'POST',
      });
      var data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || 'Could not start processing.');
      if (statusEl) {
        statusEl.textContent = 'Processing started! This page will update automatically.';
        statusEl.style.color = '#2a5a2a';
      }
      setTimeout(function(){ window.location.reload(); }, 1500);
    } catch (err) {
      console.error('Finish error:', err);
      if (statusEl) {
        statusEl.textContent = 'Failed to start processing: ' + (err.message || 'unknown');
        statusEl.style.color = '#c0392b';
      }
      doneBtn.disabled = false;
      doneBtn.textContent = currentStatus === 'error' ? 'Retry processing' : "I'm done — turn my recordings into a memoir";
    }
  });
}

// On the 'processing' view, poll the API every 15 seconds so the customer
// sees the page update when the draft is ready.
function startProcessingPoll() {

      if (data && data.customer && data.customer.status !== 'processing') {

// In-browser recorder. Captures mic audio with MediaRecorder, lets the
// customer preview it, then posts the blob to the SAME /api/customer/upload
// endpoint the file picker uses (FormData field 'audio'), so it flows into the
// existing transcription + cleanup pipeline unchanged.
function bindRecordHandler() {
  var recBtn = document.getElementById('record-btn');
  if (!recBtn) return; // not on the recording view

  var timerEl   = document.getElementById('record-timer');
  var previewEl = document.getElementById('record-preview');
  var actionsEl = document.getElementById('record-actions');
  var saveBtn   = document.getElementById('record-save');
  var redoBtn   = document.getElementById('record-redo');
  var statusEl  = document.getElementById('record-status');

  var mediaRecorder = null;
  var chunks = [];
  var audioBlob = null;
  var stream = null;
  var timerInterval = null;
  var seconds = 0;
  var isUploading = false;

  // Safety net: warn before leaving while recording or saving.
  window.addEventListener('beforeunload', function(e){
    if (window.__bcsRecording || isUploading) { e.preventDefault(); e.returnValue = ''; return ''; }
  });

  function fmtTime(s) {
    var m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function resetToStart() {
    stopTimer();
    seconds = 0;
    chunks = [];
    audioBlob = null;
    recBtn.style.display = '';
    recBtn.disabled = false;
    recBtn.textContent = '● Start recording';
    recBtn.classList.remove('btn-secondary');
    timerEl.style.display = 'none';
    timerEl.textContent = '0:00';
    previewEl.style.display = 'none';
    previewEl.removeAttribute('src');
    actionsEl.style.display = 'none';
    saveBtn.disabled = false;
    redoBtn.disabled = false;
    saveBtn.textContent = 'Save this recording';
  }

  recBtn.addEventListener('click', async function() {
    // START
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        statusEl.textContent = 'Couldn\'t access your microphone. Please allow microphone permission in your browser, then try again.';
        statusEl.style.color = '#c0392b';
        return;
      }
      chunks = [];
      var __recTypes = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm'];
        var __recMime = '';
        for (var __i = 0; __i < __recTypes.length; __i++) {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(__recTypes[__i])) { __recMime = __recTypes[__i]; break; }
        }
        mediaRecorder = __recMime ? new MediaRecorder(stream, { mimeType: __recMime }) : new MediaRecorder(stream);
      mediaRecorder.ondataavailable = function(e) { if (e.data && e.data.size) chunks.push(e.data); };
      mediaRecorder.onstop = function() {
        window.__bcsRecording = false;
        audioBlob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        previewEl.src = URL.createObjectURL(audioBlob);
        previewEl.style.display = 'block';
        actionsEl.style.display = 'none';
        recBtn.style.display = 'none';
        if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
        doSave(); // AUTO-SAVE the instant they press Stop — no button to forget
      };
      mediaRecorder.start();
      window.__bcsRecording = true;
      statusEl.textContent = '';
      seconds = 0;
      timerEl.style.display = 'block';
      timerEl.textContent = '0:00';
      timerInterval = setInterval(function() {
        seconds++;
        timerEl.textContent = fmtTime(seconds);
      }, 1000);
      recBtn.textContent = '■ Stop recording';
      recBtn.classList.add('btn-secondary');
    // STOP
    } else if (mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      stopTimer();
    }
  });

  redoBtn.addEventListener('click', function() {
    statusEl.textContent = '';
    statusEl.style.color = '#5a4a3a';
    resetToStart();
  });

  async function doSave() {
    if (!audioBlob) return;
    var token = getToken();
    if (!token) {
      statusEl.textContent = 'No access token in URL — please use your welcome email link.';
      statusEl.style.color = '#c0392b';
      return;
    }
    isUploading = true;
    actionsEl.style.display = 'none';
    recBtn.style.display = 'none';
    timerEl.style.display = 'none';
    statusEl.innerHTML = '<strong>Saving your recording — please don’t close this page…</strong>';
    statusEl.style.color = '#5a4a3a';

    var mime = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
    var ext = mime.indexOf('mp4') !== -1 ? 'm4a' : mime.indexOf('ogg') !== -1 ? 'ogg' : 'webm';
    var fname = 'recording-' + Date.now() + '.' + ext;
    var fd = new FormData();
    fd.append('audio', audioBlob, fname);

    try {
      var resp = await fetch(API_BASE + '/api/customer/upload?token=' + encodeURIComponent(token), { method: 'POST', body: fd });
      var data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || ('Save failed (status ' + resp.status + ')'));
      isUploading = false;
      statusEl.innerHTML = SAVED_SAFE_HTML;
      statusEl.style.color = '#2a5a2a';
      setTimeout(function(){ window.location.reload(); }, 4000);
    } catch (err) {
      console.error('Record save error:', err);
      isUploading = false;
      statusEl.innerHTML = '<strong style="color:#c0392b;">Your recording didn’t save yet — but it’s still here.</strong> Please tap the button below to try again.';
      actionsEl.style.display = 'block';
      saveBtn.style.display = '';
      saveBtn.disabled = false;
      saveBtn.textContent = 'Try saving again';
      redoBtn.style.display = 'none';
    }
  }
  saveBtn.addEventListener('click', doSave);
}

      field('ob-name','Send the book to (full name)','e.g. Ken Baker') +
      field('ob-addr1','Street address','e.g. 123 Main Street') +
      field('ob-addr2','Apartment / unit (optional)','') +
      '<div style="display:flex;gap:12px;flex-wrap:wrap;">' +
        '<div style="flex:2;min-width:160px;">' + field('ob-city','City','') + '</div>' +
        '<div style="flex:1;min-width:90px;">' + field('ob-state','State','') + '</div>' +
        '<div style="flex:1;min-width:90px;">' + field('ob-zip','ZIP','') + '</div>' +
      '</div>' +
      '<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">' +
        '<div style="flex:2;min-width:160px;">' + field('ob-country','Country','USA') + '</div>' +
        '<div style="flex:1;min-width:120px;"><label style="'+lstyle+'">Number of copies</label><input type="number" id="ob-copies" value="1" min="1" max="50" style="'+istyle+'"/></div>' +
      '</div>' +
      '<label style="'+lstyle+'">Anything else? (optional)</label><textarea id="ob-notes" rows="2" style="'+istyle+'"></textarea>' +
      '<button class="btn btn-large" id="orderbook-submit" style="margin-top:8px;">Send my book request</button>' +
      '<p id="orderbook-status" class="muted" style="margin-top:12px;font-size:15px;"></p>' +
    '</div>' +
  '</div>';
}

function bindOrderBook() {
  var toggle = document.getElementById('orderbook-toggle');
  if (!toggle) return;
  var form = document.getElementById('orderbook-form');
  var submit = document.getElementById('orderbook-submit');
  var statusEl = document.getElementById('orderbook-status');
  toggle.addEventListener('click', function(){
    form.style.display = (form.style.display === 'none' || !form.style.display) ? 'block' : 'none';
  });
  submit.addEventListener('click', async function(){
    var g = function(id){ var e = document.getElementById(id); return e ? (e.value || '').trim() : ''; };
    var payload = { name:g('ob-name'), address1:g('ob-addr1'), address2:g('ob-addr2'), city:g('ob-city'), state:g('ob-state'), zip:g('ob-zip'), country:g('ob-country') || 'USA', copies:g('ob-copies') || '1', notes:g('ob-notes') };
    if (!payload.name || !payload.address1 || !payload.city || !payload.state || !payload.zip) {
      statusEl.style.color = '#c0392b'; statusEl.textContent = 'Please fill in your name and full shipping address.'; return;
    }
    submit.disabled = true; var old = submit.textContent; submit.textContent = 'Sending…';
    statusEl.style.color = '#5a534c'; statusEl.textContent = 'Sending your request…';
    try {
      var resp = await fetch(API_BASE + '/api/customer/order-book?token=' + encodeURIComponent(getToken()), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      var data = await resp.json().catch(function(){ return {}; });
      if (resp.ok && data.ok) {
        statusEl.style.color = '#2a5a2a'; statusEl.textContent = data.message || 'Your book request is in! Ken will be in touch.';
        submit.style.display = 'none';
      } else {
        statusEl.style.color = '#c0392b'; statusEl.textContent = data.error || 'Something went wrong. Please try again.';
        submit.disabled = false; submit.textContent = old;
      }
    } catch (e) {
      statusEl.style.color = '#c0392b'; statusEl.textContent = 'Could not reach the server. Please try again.';
      submit.disabled = false; submit.textContent = old;
    }
  });
}

// Lets a delivered/draft-ready customer reopen recording to add more stories.
async function reopenStory(btn) {
  var token = getToken();
  if (!token) return;
  var statusEl = document.getElementById('reopen-status');
  if (btn) { btn.disabled = true; btn.textContent = 'One moment…'; }
  try {
    var resp = await fetch(API_BASE + '/api/customer/reopen-recording?token=' + encodeURIComponent(token), { method: 'POST' });
    var data = await resp.json();
    if (!resp.ok || !data.ok) throw new Error(data.error || 'Could not reopen your story.');
    if (statusEl) { statusEl.textContent = 'Opening your recording page…'; statusEl.style.color = '#2a5a2a'; }
    setTimeout(function(){ window.location.reload(); }, 900);
  } catch (err) {
    if (statusEl) { statusEl.textContent = err.message || 'Something went wrong.'; statusEl.style.color = '#c0392b'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Add more to your story'; }
  }
}

// Let a customer drag a photo straight onto the page (easy on a Mac: drag from
// the Photos app). The WHOLE page is a drop target — the customer can let go
// anywhere, so they don't have to aim for the small box even when their Photos
// window is covering most of the browser. Reuses the #photo-file upload handler.
function bindPhotoDrop() {
  var fileInput = document.getElementById('photo-file');
  if (!fileInput) return;
  var zone = fileInput.closest('.upload-zone') || fileInput.closest('.card') || fileInput.parentElement;
  if (!zone) return;

  if (!document.getElementById('photo-drop-hint')) {
    var hint = document.createElement('p');
    hint.id = 'photo-drop-hint';
    hint.style.cssText = 'margin-top:10px;font-size:14px;color:#5a4a3a;';
    hint.innerHTML = 'On a computer: open your <strong>Photos</strong> app, then <strong>drag a picture anywhere onto this page</strong> and let go &mdash; you don\'t have to aim for the box. Tip: if the Photos window is covering the page, drag its edge to make it smaller (or slide it to one side) so you can see this page beside it. On a phone, just tap the button above.';
    zone.appendChild(hint);
  }

  function isFileDrag(e) {
    if (!e.dataTransfer || !e.dataTransfer.types) return false;
    for (var i = 0; i < e.dataTransfer.types.length; i++) { if (e.dataTransfer.types[i] === 'Files') return true; }
    return false;
  }

  // Full-window overlay so the customer can drop ANYWHERE, even if only a sliver
  // of the browser is visible next to their Photos window.
  var overlay = document.getElementById('photo-drop-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'photo-drop-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(139,90,43,0.16);pointer-events:none;';
    overlay.innerHTML = '<div style="background:#fff;border:3px dashed #8b5a2b;border-radius:16px;padding:36px 48px;font-family:Georgia,serif;font-size:24px;color:#8b5a2b;text-align:center;max-width:80%;box-shadow:0 8px 40px rgba(0,0,0,0.18);">📷 Drop your photo anywhere to add it</div>';
    document.body.appendChild(overlay);
  }

  var dragDepth = 0;
  function showOverlay() { overlay.style.display = 'flex'; zone.style.outline = '3px dashed #8b5a2b'; zone.style.outlineOffset = '4px'; }
  function hideOverlay() { overlay.style.display = 'none'; zone.style.outline = ''; }

  window.addEventListener('dragenter', function(e) { if (!isFileDrag(e)) return; e.preventDefault(); dragDepth++; showOverlay(); });
  window.addEventListener('dragover',  function(e) { if (!isFileDrag(e)) return; e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'; });
  window.addEventListener('dragleave', function(e) { if (!isFileDrag(e)) return; dragDepth--; if (dragDepth <= 0) { dragDepth = 0; hideOverlay(); } });
  window.addEventListener('drop', function(e) {
    if (!isFileDrag(e)) return;
    e.preventDefault(); dragDepth = 0; hideOverlay();
    var files = e.dataTransfer && e.dataTransfer.files;
    var st = document.getElementById('photo-status');
    if (!files || !files.length) return;
    var file = files[0];
    if (file.type && file.type.indexOf('image') !== 0) {
      if (st) { st.textContent = 'That does not look like a photo — please drag an image file.'; st.style.color = '#c0392b'; }
      return;
    }
    try {
      var dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      fileInput.dispatchEvent(new Event('change', { bubbles: true }));
      if (zone.scrollIntoView) zone.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch (err) {
      if (st) { st.textContent = 'Could not read that photo. Try the Add a photo button instead.'; st.style.color = '#c0392b'; }
    }
  });
}
